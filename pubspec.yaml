name: personal_life_manager
description: "DayTrack - Expense & Task Tracker for students"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Database (offline-first, Hive Community Edition)
  hive_ce: ^2.5.0
  hive_ce_flutter: ^2.1.0

  # State management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.69.0

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Biometric / PIN auth
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.7
  hive_ce_generator: ^1.6.0

flutter:
  uses-material-design: true
